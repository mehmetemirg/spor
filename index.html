<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker Pro">
    <title>Workout Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* LACÝVERT & BEYAZ TEMA DEĐÝŢKENLERÝ */
        :root {
            --bg-color: #0F172A; /* Derin Lacivert Arka Plan */
            --surface-color: #1E293B; /* Kartlar için Lacivert */
            --surface-color-light: #334155; /* Ýnputlar için Açýk Lacivert */
            --text-color: #FFFFFF; /* Beyaz Metin */
            --text-muted: #94A3B8; /* Soluk Mavi/Gri Metin */
            --primary-color: #FFFFFF; /* Ana Vurgu (Beyaz) */
            --secondary-color: #38BDF8; /* Açýk Mavi (Ýkincil Vurgu) */
            --danger-color: #EF4444; /* Kýrmýzý (Silme iţlemleri) */
            --border-color: #475569; /* Çizgiler için Gri/Mavi */
            
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; 
        }

        .navbar {
            width: 100%; max-width: 1200px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px; padding: 15px 20px;
            background-color: var(--surface-color); border-radius: var(--radius-lg); box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
        }
        .navbar h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--primary-color); }

        /* BUTONLAR */
        .btn { 
            background-color: var(--primary-color); color: var(--bg-color); border: none; 
            padding: 10px 16px; border-radius: var(--radius-pill); cursor: pointer; 
            font-weight: 700; margin-left: 5px; font-size: 14px; transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn:hover { opacity: 0.9; }
        
        .btn-secondary { background-color: transparent; color: var(--primary-color); border: 1.5px solid var(--primary-color); }
        .btn-danger { background-color: transparent; color: var(--danger-color); border: 1.5px solid var(--danger-color); }
        .btn-small { padding: 6px 12px; font-size: 12px; }

        .main-container { display: flex; flex-direction: row; width: 100%; max-width: 1200px; gap: 20px; align-items: flex-start; }
        .left-section { flex: 2; display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .body-map-section { flex: 1; background: var(--surface-color); padding: 20px; border-radius: var(--radius-lg); width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); }

        .home-planner, .calendar-section { background: var(--surface-color); padding: 20px; border-radius: var(--radius-lg); box-sizing: border-box; width: 100%; border: 1px solid var(--border-color); }
        .home-planner { border-left: 5px solid var(--primary-color); }
        .home-planner h3 { margin-top: 0; margin-bottom: 12px; color: var(--primary-color); font-size: 16px;}
        .home-planner ul { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .home-planner li { background: var(--surface-color-light); padding: 6px 12px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;}

        /* TAKVÝM */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-name { text-align: center; font-weight: 600; padding: 5px 0; color: var(--text-muted); font-size: 13px; }
        .calendar-day {
            background-color: var(--surface-color-light); border-radius: var(--radius-sm); height: 70px; padding: 6px;
            cursor: pointer; position: relative; box-sizing: border-box; overflow: hidden; font-weight: 600; font-size: 14px;
        }
        .calendar-day.empty { background-color: transparent; cursor: default; }
        .calendar-day.cardio-day { border: 2px dashed var(--secondary-color) !important; }

        /* MODALLAR */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; padding: 10px; box-sizing: border-box;}
        .modal-content { background: var(--surface-color); padding: 25px; border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; box-sizing: border-box; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.5);}
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 28px; color: var(--text-muted); }

        input, select { background: var(--surface-color-light); color: white; border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-sm); width: 100%; margin-bottom: 12px; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); }
        .set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
        .set-row input { margin-bottom: 0; }
        .inline-input { width: 65px; padding: 8px; display: inline-block; margin-bottom: 0; text-align: center; font-weight: 600; background: var(--surface-color-light); border: 1px solid var(--border-color); border-radius: 6px;}

        /* ÝSTATÝSTÝKLER */
        .stats-panel { background: var(--bg-color); padding: 15px; border-radius: var(--radius-md); font-size: 14px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .stats-panel h4 { margin-top: 0; margin-bottom: 12px; color: var(--primary-color); font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .muscle-stat { background: var(--surface-color-light); padding: 8px 10px; border-radius: var(--radius-sm); box-sizing: border-box; font-size: 13px; font-weight: 500;}
        .text-danger { color: var(--danger-color); font-weight: 700; }

        .svg-container { display: flex; gap: 10px; justify-content: center; margin-top: 15px; width: 100%; }
        svg { flex: 1; max-width: 130px; height: auto; }
        .muscle { fill: var(--surface-color-light); stroke: var(--bg-color); stroke-width: 2; transition: fill 0.3s ease; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; overflow-x: auto; white-space: nowrap;}
        .tab { cursor: pointer; padding: 5px 10px; color: var(--text-muted); font-weight: 600; font-size: 14px;}
        .tab.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
        
        .program-card { background: var(--bg-color); padding: 15px; border-radius: var(--radius-md); margin-bottom: 15px; border-left: 4px solid var(--primary-color); border: 1px solid var(--border-color); border-left-width: 4px; }
        #chartContainer { margin-top: 20px; background: var(--bg-color); padding: 10px; border-radius: var(--radius-md); width: 100%; box-sizing: border-box; border: 1px solid var(--border-color);}
        
        .accordion-header { background: var(--surface-color-light); padding: 15px; cursor: pointer; border-radius: var(--radius-md); margin-top: 10px; font-weight: 600; display: flex; justify-content: space-between; }
        .accordion-content { display: none; padding: 15px; background: var(--bg-color); margin-bottom: 5px; border-radius: 0 0 var(--radius-md) var(--radius-md); border: 1px solid var(--border-color); border-top: none; }
        .accordion-item { color: var(--text-muted); cursor: pointer; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-weight: 500; }
        .accordion-item:hover { color: white; }

        /* MOBÝL UYUMLULUK */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .navbar div { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
            .btn { margin-left: 0; flex: 1; text-align: center; font-size: 13px; padding: 10px;}
            
            .main-container { flex-direction: column; gap: 15px; }
            .left-section, .body-map-section { width: 100%; padding: 15px; }
            
            .calendar-day { height: 55px; padding: 4px; font-size: 12px; }
            .calendar-day span { top: 4px !important; left: 6px !important; }
            
            .modal-content { padding: 20px 15px; }
            .set-row { flex-wrap: wrap; justify-content: space-between;}
            .set-row input { width: 48%; }
            .set-row label { width: 100%; margin-bottom: 5px;}
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>??? Workout Tracker</h2>
        <div>
            <button class="btn btn-secondary" onclick="exportData()">Export</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Import</button>
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
            <button class="btn" onclick="openProgramsModal()">Programs</button>
            <button class="btn" onclick="openWorkoutModal(new Date().toISOString().split('T')[0])">Today</button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="left-section">
            <div class="home-planner" id="homePlannerBox"></div>

            <div class="calendar-section">
                <div class="calendar-header">
                    <button class="btn btn-secondary btn-small" onclick="changeMonth(-1)">&#9664; Prev</button>
                    <h3 id="monthYearDisplay" style="margin:0; font-weight:700; font-size:18px;">May 2026</h3>
                    <button class="btn btn-secondary btn-small" onclick="changeMonth(1)">Next &#9654;</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <div class="body-map-section">
            <div class="stats-panel">
                <h4>14-Day Summary</h4>
                <div class="stats-row">
                    <span style="color:var(--text-muted);">Attendance:</span>
                    <span id="statAttendance" style="font-weight:700;">0/14 Days</span>
                </div>
                <div class="stats-row">
                    <span style="color:var(--text-muted);">Cardio:</span>
                    <span id="statCardio" style="font-weight:700;">0 min / 0 kcal</span>
                </div>
                
                <h5 style="margin: 15px 0 10px 0; color: var(--text-muted); font-size:13px;">Muscle Groups (Days Worked)</h5>
                <div class="muscle-grid" id="statMuscles"></div>
            </div>

            <div style="text-align: center;">
                <h3 style="margin-bottom: 5px; font-weight:700; font-size:16px;">Recovery Map</h3>
                <div class="svg-container">
                    <svg viewBox="0 0 200 400" id="bodyFront">
                        <text x="100" y="20" text-anchor="middle" fill="#94A3B8" font-size="16" font-weight="700">Front</text>
                        <circle cx="100" cy="50" r="20" fill="var(--surface-color-light)" />
                        <rect class="muscle svg-core" x="80" y="150" width="40" height="60" />
                        <path class="muscle svg-chest" d="M 70 80 L 130 80 L 120 140 L 80 140 Z" />
                        <circle class="muscle svg-shoulders" cx="60" cy="90" r="15" />
                        <circle class="muscle svg-shoulders" cx="140" cy="90" r="15" />
                        <rect class="muscle svg-biceps" x="45" y="110" width="15" height="40" rx="7" />
                        <rect class="muscle svg-biceps" x="140" y="110" width="15" height="40" rx="7" />
                        <rect class="muscle svg-legs" x="75" y="220" width="20" height="90" rx="10" />
                        <rect class="muscle svg-legs" x="105" y="220" width="20" height="90" rx="10" />
                    </svg>
                    <svg viewBox="0 0 200 400" id="bodyBack">
                        <text x="100" y="20" text-anchor="middle" fill="#94A3B8" font-size="16" font-weight="700">Back</text>
                        <circle cx="100" cy="50" r="20" fill="var(--surface-color-light)" />
                        <path class="muscle svg-back" d="M 65 80 L 135 80 L 120 180 L 80 180 Z" />
                        <circle class="muscle svg-shoulders" cx="60" cy="90" r="15" />
                        <circle class="muscle svg-shoulders" cx="140" cy="90" r="15" />
                        <rect class="muscle svg-triceps" x="45" y="110" width="15" height="40" rx="7" />
                        <rect class="muscle svg-triceps" x="140" y="110" width="15" height="40" rx="7" />
                        <rect class="muscle svg-legs" x="75" y="220" width="20" height="90" rx="10" />
                        <rect class="muscle svg-legs" x="105" y="220" width="20" height="90" rx="10" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- WORKOUT MODAL -->
    <div id="workoutModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('workoutModal')">&times;</span>
            <h3 id="workoutModalTitle" style="margin-top:0; font-size:18px;">Workout</h3>
            
            <div style="background-color: rgba(255, 255, 255, 0.1); border: 1px solid var(--primary-color); color: var(--primary-color); padding: 10px; border-radius: var(--radius-sm); margin-bottom: 15px; font-size: 13px; font-weight: 600;" id="nextProgramBadge">
                <span id="nextProgramText">Suggested Next: None</span>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <select id="programSelector" style="margin-bottom:0; flex:2;">
                    <option value="">-- Load a Program --</option>
                </select>
                <button class="btn btn-secondary" style="flex:1;" onclick="applyProgramToDay()">Load</button>
            </div>

            <div id="exerciseList" style="margin-bottom: 20px;"></div>
            
            <h4 style="color: var(--primary-color); margin-bottom:10px; border-top: 1px solid var(--border-color); padding-top: 15px;">Add Manual Exercise</h4>
            <div style="display:flex; gap:10px;">
                <select id="muscleGroup" onchange="handleMuscleChange()" style="flex:1;">
                    <option value="Chest">Chest</option><option value="Back">Back</option>
                    <option value="Legs">Legs</option><option value="Shoulders">Shoulders</option>
                    <option value="Core">Core</option><option value="Biceps">Biceps</option>
                    <option value="Triceps">Triceps</option><option value="Cardio">Cardio</option>
                </select>
                <input type="text" id="exerciseName" placeholder="Exercise Name" style="flex:2;">
            </div>
            
            <div id="setsContainer">
                <div class="set-row">
                    <label class="set-label" style="font-weight:600; color:var(--text-muted); font-size:13px;">Set 1:</label>
                    <input type="number" placeholder="Reps" class="rep-input" onchange="autoFillReps(this)">
                    <input type="number" placeholder="Weight (kg)" class="weight-input" onchange="autoFillWeight(this)">
                </div>
            </div>
            
            <button id="addSetBtn" class="btn btn-secondary btn-small" style="margin-top:10px;" onclick="addSetRow()">+ Add Set</button>
            <button class="btn" style="width: 100%; margin-top: 20px; padding:12px;" onclick="saveExercise()">Save Exercise</button>
        </div>
    </div>

    <!-- PROGRAMS MODAL -->
    <div id="programsModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-btn" onclick="closeModal('programsModal')">&times;</span>
            <div class="tabs">
                <div class="tab active" id="tabPrograms" onclick="switchTab('Programs')">My Programs</div>
                <div class="tab" id="tabProgress" onclick="switchTab('Progress')">Progress Chart</div>
            </div>
            <div id="contentPrograms">
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <input type="text" id="newProgramName" placeholder="New Program Name" style="margin:0; flex:2;">
                    <button class="btn" style="flex:1;" onclick="createNewProgram()">Create</button>
                </div>
                <div id="programsList"></div>
            </div>
            <div id="contentProgress" style="display:none;">
                <p style="color:var(--text-muted); font-size:13px;">Select a muscle group, then choose an exercise.</p>
                <div id="accordionContainer"></div>
                <div id="chartContainer" style="display:none; width:100%;">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PWA Service Worker (Uygulamanýn çevrimdýţý da çalýţmasý için)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
            });
        }

        // Veritabaný (LocalStorage) yüklemesi
        let db = JSON.parse(localStorage.getItem('workoutApp')) || { workouts: {}, programs: {}, programOrder: [], currentProgramIndex: 0 };
        if (!db.programOrder) { db.programOrder = Object.keys(db.programs); }
        if (db.currentProgramIndex === undefined) db.currentProgramIndex = 0;

        // Vücut gruplarý için renkler
        const muscleColors = { "Chest": "#EF4444", "Back": "#3B82F6", "Legs": "#22C55E", "Shoulders": "#A855F7", "Core": "#F59E0B", "Biceps": "#F97316", "Triceps": "#10B981", "Cardio": "#94A3B8" };
        let currentDate = new Date();
        let selectedDateForWorkout = "";
        let chartInstance = null;

        function renderHomePlanner() {
            const plannerBox = document.getElementById('homePlannerBox');
            if(db.programOrder.length === 0) { plannerBox.style.display = 'none'; return; }
            plannerBox.style.display = 'block';
            let nextProgName = db.programOrder[db.currentProgramIndex % db.programOrder.length];
            let exercises = db.programs[nextProgName] || [];
            let exHtml = exercises.length > 0 ? exercises.map(ex => `<li>${ex.name} (${ex.sets.length} sets)</li>`).join('') : `<li>No exercises added yet.</li>`;
            plannerBox.innerHTML = `<h3>Suggested Next: ${nextProgName}</h3><ul>${exHtml}</ul>`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = ""; 
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            document.getElementById('monthYearDisplay').innerText = new Date(year, month).toLocaleString('en-US', { month: 'short', year: 'numeric' });
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => { grid.innerHTML += `<div class='day-name'>${day}</div>`; });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i = 0; i < firstDay; i++) grid.innerHTML += `<div class='calendar-day empty'></div>`;
            for(let i = 1; i <= daysInMonth; i++) {
                let dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                let dayDiv = document.createElement('div'); dayDiv.className = 'calendar-day';
                dayDiv.innerHTML = `<span style="position:absolute; top:4px; left:6px; opacity:0.9;">${i}</span>`;
                
                if(db.workouts[dateStr] && db.workouts[dateStr].length > 0) {
                    const muscles = [...new Set(db.workouts[dateStr].map(ex => ex.muscle))];
                    if(muscles.includes('Cardio')) dayDiv.classList.add('cardio-day');
                    if(muscles.length === 1) {
                        dayDiv.style.backgroundColor = muscleColors[muscles[0]]; dayDiv.style.color = '#fff';
                    } else {
                        let parts = []; let p = 100 / muscles.length; let cp = 0;
                        muscles.forEach(m => { let color = muscleColors[m] || '#334155'; parts.push(`${color} ${cp}% ${cp + p}%`); cp += p; });
                        dayDiv.style.background = `linear-gradient(135deg, ${parts.join(', ')})`; dayDiv.style.color = '#fff';
                    }
                }
                dayDiv.onclick = () => openWorkoutModal(dateStr);
                grid.appendChild(dayDiv);
            }
            updateStatsAndBodyMap(); renderHomePlanner();
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

        function updateStatsAndBodyMap() {
            let frequency = { "chest":0, "back":0, "legs":0, "shoulders":0, "core":0, "biceps":0, "triceps":0 };
            let cardioMins = 0; let cardioKcal = 0; let attendanceCount = 0; let today = new Date();
            
            for(let i=0; i<14; i++) {
                let d = new Date(today); d.setDate(d.getDate() - i); let dateStr = d.toISOString().split('T')[0];
                if(db.workouts[dateStr] && db.workouts[dateStr].length > 0) {
                    attendanceCount++; let dailyMuscles = new Set();
                    db.workouts[dateStr].forEach(ex => {
                        let m = ex.muscle.toLowerCase();
                        if(m === 'cardio') { ex.sets.forEach(s => { cardioMins += parseFloat(s.reps) || 0; cardioKcal += parseFloat(s.weight) || 0; }); } 
                        else { dailyMuscles.add(m); }
                    });
                    dailyMuscles.forEach(m => { if(frequency[m] !== undefined) frequency[m]++; });
                }
            }

            document.getElementById('statAttendance').innerText = `${attendanceCount}/14 Days`;
            document.getElementById('statCardio').innerText = `${cardioMins} min / ${cardioKcal} kcal`;
            let musclesHtml = '';
            Object.keys(frequency).forEach(m => {
                let count = frequency[m]; let isDanger = count <= 1 ? 'text-danger' : ''; 
                let name = m.charAt(0).toUpperCase() + m.slice(1);
                musclesHtml += `<div class="muscle-stat ${isDanger}">${name}: <strong style="float:right;">${count}d</strong></div>`;
            });
            document.getElementById('statMuscles').innerHTML = musclesHtml;

            const getHeatColor = (count) => count===0?"#334155" : count===1?"#22C55E" : count===2?"#3B82F6" : count===3?"#F59E0B" : "#EF4444";
            Object.keys(frequency).forEach(muscle => {
                document.querySelectorAll(`.svg-${muscle}`).forEach(el => el.style.fill = getHeatColor(frequency[muscle]));
            });
        }

        function getNextProgramName() {
            if(db.programOrder.length === 0) return null;
            return db.programOrder[db.currentProgramIndex % db.programOrder.length];
        }

        function updatePlannerBadge() {
            const nextProg = getNextProgramName();
            document.getElementById('nextProgramText').innerHTML = nextProg ? `<strong>Suggested Next:</strong> ${nextProg}` : `<strong>Suggested Next:</strong> None`;
        }

        function openWorkoutModal(dateStr) {
            selectedDateForWorkout = dateStr; document.getElementById('workoutModalTitle').innerText = `Workout: ${dateStr}`;
            updatePlannerBadge(); populateProgramSelector(); renderExerciseList(); resetForm();
            document.getElementById('workoutModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateSetData(exIndex, setIndex, field, value) {
            if(!db.workouts[selectedDateForWorkout]) return;
            db.workouts[selectedDateForWorkout][exIndex].sets[setIndex][field] = value;
            if(setIndex === 0 && value !== "") {
                let sets = db.workouts[selectedDateForWorkout][exIndex].sets;
                for(let i=1; i<sets.length; i++) { if(sets[i][field] == 0 || sets[i][field] === "") sets[i][field] = value; }
                saveDb(); renderExerciseList(); 
            } else { saveDb(); }
            updateStatsAndBodyMap();
        }

        function renderExerciseList() {
            const listDiv = document.getElementById('exerciseList'); listDiv.innerHTML = "";
            const dayWorkouts = db.workouts[selectedDateForWorkout] || [];
            
            dayWorkouts.forEach((ex, exIndex) => {
                let isCardio = ex.muscle === 'Cardio';
                let setsHtml = ex.sets.map((s, setIndex) => {
                    let repInput = `<input type="number" class="inline-input" value="${s.reps}" placeholder="${isCardio ? 'Min' : 'Reps'}" onchange="updateSetData(${exIndex}, ${setIndex}, 'reps', this.value)">`;
                    let weightInput = `<input type="number" class="inline-input" value="${s.weight}" placeholder="${isCardio ? 'Kcal' : 'Kg'}" onchange="updateSetData(${exIndex}, ${setIndex}, 'weight', this.value)">`;
                    let separator = isCardio ? " <span style='color:var(--text-muted); font-size:12px;'>min</span> " : " <span style='color:var(--text-muted); font-size:12px;'>x</span> ";
                    let suffix = isCardio ? " <span style='color:var(--text-muted); font-size:12px;'>kcal</span>" : " <span style='color:var(--text-muted); font-size:12px;'>kg</span>";
                    
                    return `<div style="margin-top:8px; display:flex; align-items:center; gap:6px; font-size:13px;">
                                <span style="font-weight:600; width:40px; color:var(--text-muted);">S${setIndex+1}:</span> 
                                ${repInput} ${separator} ${weightInput} ${suffix}
                            </div>`;
                }).join("");

                listDiv.innerHTML += `
                    <div style="background:var(--bg-color); padding:15px; margin-bottom:12px; border-radius:var(--radius-md); border-left: 4px solid ${muscleColors[ex.muscle]}; border: 1px solid var(--border-color); border-left-width: 4px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid var(--border-color); padding-bottom:8px;">
                            <strong style="font-size:15px;">${ex.name} <span style="font-size:12px; font-weight:normal; color:var(--text-muted);">(${ex.muscle})</span></strong>
                            <button class="btn btn-danger btn-small" style="padding:4px 8px;" onclick="deleteExercise('${selectedDateForWorkout}', ${exIndex})">X</button>
                        </div>
                        <div>${setsHtml}</div>
                    </div>`;
            });
        }

        function applyProgramToDay() {
            const pName = document.getElementById('programSelector').value; if(!pName) return;
            if(!db.workouts[selectedDateForWorkout]) db.workouts[selectedDateForWorkout] = [];
            const programClone = JSON.parse(JSON.stringify(db.programs[pName]));
            db.workouts[selectedDateForWorkout] = db.workouts[selectedDateForWorkout].concat(programClone);
            if(pName === getNextProgramName()) { db.currentProgramIndex++; updatePlannerBadge(); }
            saveDb(); renderExerciseList(); renderCalendar(); document.getElementById('programSelector').value = "";
        }

        function autoFillWeight(input) {
            const val = input.value; if(!val) return; const weights = document.querySelectorAll('.weight-input');
            for(let i=1; i<weights.length; i++) if(weights[i].value === "") weights[i].value = val;
        }

        function autoFillReps(input) {
            const val = input.value; if(!val) return; const reps = document.querySelectorAll('.rep-input');
            for(let i=1; i<reps.length; i++) if(reps[i].value === "") reps[i].value = val;
        }

        function handleMuscleChange() {
            const muscle = document.getElementById('muscleGroup').value;
            const reps = document.querySelectorAll('.rep-input'); const weights = document.querySelectorAll('.weight-input');
            const labels = document.querySelectorAll('.set-label'); const btn = document.getElementById('addSetBtn');
            if(muscle === 'Cardio') {
                reps.forEach(r => r.placeholder = "Min"); weights.forEach(w => w.placeholder = "Kcal");
                labels.forEach(l => l.innerText = "Session:"); btn.style.display = 'none';
            } else {
                reps.forEach(r => r.placeholder = "Reps"); weights.forEach(w => w.placeholder = "Kg");
                labels.forEach((l, i) => l.innerText = `Set ${i+1}:`); btn.style.display = 'inline-block';
            }
        }

        function addSetRow() {
            const container = document.getElementById('setsContainer'); const count = container.children.length + 1;
            const div = document.createElement('div'); div.className = 'set-row';
            div.innerHTML = `<label class="set-label" style="font-weight:600; color:var(--text-muted); font-size:13px; width:100%;">Set ${count}:</label><input type="number" placeholder="Reps" class="rep-input" onchange="autoFillReps(this)" style="width:48%;"><input type="number" placeholder="Weight (kg)" class="weight-input" onchange="autoFillWeight(this)" style="width:48%;">`;
            container.appendChild(div);
        }

        function resetForm() {
            document.getElementById('exerciseName').value = "";
            document.getElementById('setsContainer').innerHTML = `<div class="set-row"><label class="set-label" style="font-weight:600; color:var(--text-muted); font-size:13px; width:100%;">Set 1:</label><input type="number" placeholder="Reps" class="rep-input" onchange="autoFillReps(this)" style="width:48%;"><input type="number" placeholder="Weight (kg)" class="weight-input" onchange="autoFillWeight(this)" style="width:48%;"></div>`;
            handleMuscleChange();
        }

        function saveExercise() {
            const muscle = document.getElementById('muscleGroup').value; const name = document.getElementById('exerciseName').value.trim();
            if(!name) return;
            const repInputs = document.querySelectorAll('.rep-input'); const weightInputs = document.querySelectorAll('.weight-input');
            let sets = []; for(let i=0; i<repInputs.length; i++) sets.push({ reps: repInputs[i].value||0, weight: weightInputs[i].value||0 });
            if(!db.workouts[selectedDateForWorkout]) db.workouts[selectedDateForWorkout] = [];
            db.workouts[selectedDateForWorkout].push({ name, muscle, sets });
            saveDb(); renderExerciseList(); resetForm(); renderCalendar();
        }

        function deleteExercise(dateStr, index) {
            db.workouts[dateStr].splice(index, 1);
            if(db.workouts[dateStr].length === 0) { delete db.workouts[dateStr]; if(db.currentProgramIndex > 0) db.currentProgramIndex--; }
            saveDb(); renderExerciseList(); renderCalendar();
        }

        function populateProgramSelector() {
            const sel = document.getElementById('programSelector'); sel.innerHTML = '<option value="">-- Load a Program --</option>';
            db.programOrder.forEach(pName => { sel.innerHTML += `<option value="${pName}">${pName}</option>`; });
        }

        function createNewProgram() {
            const name = document.getElementById('newProgramName').value.trim(); if(!name || db.programs[name]) return;
            db.programs[name] = []; db.programOrder.push(name); document.getElementById('newProgramName').value = ""; saveDb(); renderProgramsList(); renderHomePlanner();
        }

        function addExerciseToProgram(pName) {
            const exName = prompt("Exercise Name:"); if(!exName) return;
            const muscle = prompt("Muscle Group (Chest, Back, Legs, Shoulders, Core, Biceps, Triceps, Cardio):", "Chest"); if(!muscle) return;
            const setsCount = parseInt(prompt("How many sets?", "3")) || 1;
            let sets = []; for(let i=0; i<setsCount; i++) sets.push({reps:0, weight:0});
            db.programs[pName].push({ name: exName, muscle: muscle, sets: sets }); saveDb(); renderProgramsList(); renderHomePlanner();
        }

        function deleteExerciseFromProgram(pName, index) { db.programs[pName].splice(index, 1); saveDb(); renderProgramsList(); renderHomePlanner(); }
        function deleteProgram(pName) {
            if(!confirm(`Delete program '${pName}'?`)) return;
            delete db.programs[pName]; db.programOrder = db.programOrder.filter(name => name !== pName); saveDb(); renderProgramsList(); renderHomePlanner();
        }

        function moveProgram(index, direction) {
            if (index + direction < 0 || index + direction >= db.programOrder.length) return;
            let temp = db.programOrder[index]; db.programOrder[index] = db.programOrder[index + direction]; db.programOrder[index + direction] = temp;
            saveDb(); renderProgramsList(); renderHomePlanner();
        }

        function renderProgramsList() {
            const list = document.getElementById('programsList'); list.innerHTML = "";
            db.programOrder.forEach((pName, index) => {
                let exercises = db.programs[pName];
                let exercisesHtml = exercises.map((ex, i) => `<li style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid var(--border-color); padding-bottom:8px; font-size:13px;"><span><strong style="color:#fff;">${ex.name}</strong> <span style="color:var(--text-muted);">(${ex.muscle}) - ${ex.sets.length} sets</span></span><button class="btn btn-danger btn-small" style="padding:4px 8px;" onclick="deleteExerciseFromProgram('${pName}', ${i})">X</button></li>`).join('');
                list.innerHTML += `<div class="program-card"><div style="display:flex; justify-content:space-between; align-items:center;"><h4 style="margin:0; font-size:15px;"><span style="color:var(--primary-color); margin-right:5px;">#${index+1}</span> ${pName}</h4><div style="display:flex; gap:5px;"><button class="btn btn-secondary btn-small" onclick="moveProgram(${index}, -1)">&#9650;</button><button class="btn btn-secondary btn-small" onclick="moveProgram(${index}, 1)">&#9660;</button><button class="btn btn-secondary btn-small" onclick="addExerciseToProgram('${pName}')">+</button><button class="btn btn-danger btn-small" onclick="deleteProgram('${pName}')">Delete</button></div></div><ul style="margin-top:15px; padding-left:0; list-style:none;">${exercisesHtml || '<span style="color:var(--text-muted); font-size:13px;">No exercises added yet.</span>'}</ul></div>`;
            });
        }

        function switchTab(tab) {
            document.getElementById('tabPrograms').classList.remove('active'); document.getElementById('tabProgress').classList.remove('active');
            document.getElementById('contentPrograms').style.display = 'none'; document.getElementById('contentProgress').style.display = 'none';
            document.getElementById(`tab${tab}`).classList.add('active'); document.getElementById(`content${tab}`).style.display = 'block';
        }

        function openProgramsModal() {
            document.getElementById('programsModal').style.display = 'flex'; switchTab('Programs'); renderProgramsList(); buildAccordion();
        }

        function toggleAccordion(id) { const content = document.getElementById(id); content.style.display = content.style.display === 'block' ? 'none' : 'block'; }

        function buildAccordion() {
            const container = document.getElementById('accordionContainer'); container.innerHTML = ""; let dataMap = {}; 
            for(let date in db.workouts) { db.workouts[date].forEach(ex => { if(!dataMap[ex.muscle]) dataMap[ex.muscle] = new Set(); dataMap[ex.muscle].add(ex.name); }); }
            for(let muscle in dataMap) {
                let exercises = Array.from(dataMap[muscle]);
                let exListHtml = exercises.map(ex => `<div class="accordion-item" style="font-size:14px;" onclick="drawChart('${ex}', '${muscle}')">&#9658; ${ex}</div>`).join('');
                container.innerHTML += `<div class="accordion-header" style="font-size:14px;" onclick="toggleAccordion('acc-${muscle}')">${muscle} <span style="color:${muscleColors[muscle]}">&#9660;</span></div><div class="accordion-content" id="acc-${muscle}">${exListHtml}</div>`;
            }
        }

        // JS hatasýný düzelttiđimiz yer: Chart.js içindeki borderColor deđeri '#FFFFFF' yapýldý
        function drawChart(exerciseName, muscle) {
            document.getElementById('chartContainer').style.display = 'block'; let chartData = []; let isCardio = muscle === 'Cardio';
            let sortedDates = Object.keys(db.workouts).sort();
            sortedDates.forEach(date => {
                let exercisesOfDay = db.workouts[date].filter(ex => ex.name === exerciseName);
                if(exercisesOfDay.length > 0) {
                    let dayMaxVal = 0; let dayReps = 0;
                    exercisesOfDay.forEach(ex => { ex.sets.forEach(s => { let val = parseFloat(s.weight); if(val > dayMaxVal) { dayMaxVal = val; dayReps = s.reps; } }); });
                    if(dayMaxVal > 0) chartData.push({ x: date, y: dayMaxVal, reps: dayReps });
                }
            });
            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('progressChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line', data: { datasets: [{ label: isCardio ? `Max Calories - ${exerciseName}` : `Max Weight (kg) - ${exerciseName}`, data: chartData, borderColor: '#FFFFFF', backgroundColor: 'rgba(255,255,255,0.1)', borderWidth: 3, fill: true, tension: 0.4 }] },
                options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { type: 'category', grid: { color: '#334155' } } }, plugins: { legend: { labels: { color: '#ffffff' } }, tooltip: { callbacks: { label: function(context) { let val = context.raw.y; let reps = context.raw.reps; if(isCardio) return `Calories: ${val} (Duration: ${reps} min)`; return `Weight: ${val} kg (Reps: ${reps})`; } } } } }
            });
        }

        function saveDb() { localStorage.setItem('workoutApp', JSON.stringify(db)); }
        function exportData() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "workout_backup.json"); dl.click(); }
        function importData(event) {
            const file = event.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = function(e) { try { db = JSON.parse(e.target.result); if(!db.programOrder) db.programOrder = Object.keys(db.programs||{}); saveDb(); alert("Data imported!"); renderCalendar(); } catch(err) { alert("Invalid file format!"); } };
            reader.readAsText(file);
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
